spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletdb}
    username: ${DB_USERNAME:walletdbuser}
    password: ${DB_PASSWORD:walletdbpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  jwt:
    secret: ${JWT_SECRET:ZwHb76tYhO6UCtde6fdjaMkYS5SeLfruZ0LOB6WyOuY=}
    expiration: ${JWT_EXPIRATION:86400000}

server:
  port: ${SERVER_PORT:8080}
